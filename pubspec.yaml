name: qr_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.7

dependencies:
  envied: ^1.3.3
  flutter:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_secure_storage: ^10.0.0
  get: ^4.7.3
  google_fonts: ^8.0.2
  http: ^1.6.0
  image_picker: ^1.2.1
  intl: ^0.20.2
  mobile_scanner: ^7.2.0
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  envied_generator: ^1.3.3
  build_runner: ^2.12.2

flutter:
  uses-material-design: true
  assets:
    - assets/icon/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/qr.png"
  adaptive_icon_background: "#000000"
